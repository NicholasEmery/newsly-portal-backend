version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    pull-request-branch-name:
      separator: "/"
    commit-message:
      prefix: "deps"
      include: scope
    assignees:
      - "NicholasEmery"
    labels:
      - "dependencies"
      - "automated"
    groups:
      nest-and-platform:
        patterns:
          - "@nestjs/*"
          - "nestjs*"
          - "reflect-metadata"
          - "rxjs"
      database-and-prisma:
        patterns:
          - "prisma"
          - "@prisma/client"
          - "redis"
          - "cache-manager-redis-store"
      auth-and-security:
        patterns:
          - "passport*"
          - "@nestjs/jwt"
          - "@nestjs/passport"
          - "bcrypt"
          - "cookie-parser"
          - "passport-google-oauth20"
          - "passport-jwt"
          - "passport-local"
      validation-and-serialization:
        patterns:
          - "class-validator"
          - "class-transformer"
          - "swagger-ui-express"
          - "@nestjs/swagger"
      testing-and-linting:
        patterns:
          - "eslint*"
          - "prettier"
          - "jest*"
          - "ts-jest"
          - "supertest"
      types-and-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "ts-node"
          - "ts-loader"
          - "tsconfig-paths"
          - "source-map-support"
          - "@nestjs/cli"
          - "@nestjs/testing"
      utilities:
        patterns:
          - "dotenv"
          - "axios"
          - "multer"
          - "nodemailer"
    rebase-strategy: "auto"


